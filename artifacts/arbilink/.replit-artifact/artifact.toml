kind = "web"
previewPath = "/"
title = "ArbiLink - Arbitrum MCP Server"
version = "1.0.0"
id = "artifacts/arbilink"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23610

[services.development]
run = "pnpm --filter @workspace/arbilink run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arbilink", "run", "build" ]
publicDir = "artifacts/arbilink/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23610"
BASE_PATH = "/"
